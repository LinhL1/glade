name: Daily push notification

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC every day
  workflow_dispatch:        # also triggerable manually from GitHub Actions UI

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install web-push
      - run: node push-send.js
        env:
          VAPID_PUBLIC_KEY:   ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:  ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:      ${{ secrets.VAPID_SUBJECT }}
          PUSH_SUBSCRIPTIONS: ${{ secrets.PUSH_SUBSCRIPTIONS }}
